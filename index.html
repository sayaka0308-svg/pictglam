<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ピクトグラム制作ツール（名前入り保存対応）</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
  body { font-family: sans-serif; }
  .title-row {
    display: flex;
    justify-content: space-between;
    width: 1200px;
    margin-bottom: 10px;
  }
  .title-row div {
    width: 400px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
  }
  .grid-row {
    display: flex;
    gap: 10px;
  }
</style>
</head>
<body>

<h2>美術Ⅰ課題：ピクトグラム制作ツール</h2>

<!-- クラス番号（1101形式）＋名前 -->
<label>クラス・番号（1年1組1番 → 1101 と入力）：  
  <input id="classCode" type="text" style="width:120px;">
</label>

<label>名前：<input id="studentName" type="text" style="width:150px;"></label>

<br><br>

<div class="title-row">
  <div>歩く</div>
  <div>走る</div>
  <div>跳ぶ</div>
</div>

<div class="grid-row">
  <canvas id="grid0" width="400" height="400" style="border:1px solid black;"></canvas>
  <canvas id="grid1" width="400" height="400" style="border:1px solid black;"></canvas>
  <canvas id="grid2" width="400" height="400" style="border:1px solid black;"></canvas>
</div>

<br>
<canvas id="palette" width="1200" height="40" style="border:1px solid black;"></canvas>

<br><br>
<button id="saveBtn" style="font-size:18px; padding:10px 20px;">PNGで保存</button>
<button id="pdfBtn" style="font-size:18px; padding:10px 20px;">
